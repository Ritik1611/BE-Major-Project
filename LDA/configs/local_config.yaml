mode: interactive                # one of: interactive | batch | continuous

ingest:
  video:
    enabled: true
    device: 0                   # camera index (integer) or path to file-based ingest
    fps: 30
    output_dir: "./processed/video"
    receipt_dir: "./receipts"
    params:
      blur_kernel: 99
      head_pose_normalize: true
      openface:
        enabled: true
        features: ["AUs","gaze","pose","blink"]
        # Set this to the absolute path of your FeatureExtraction binary
        binary_path: "/home/ritik/Desktop/BE-Major-Project/LDA/OpenFace/build/bin/FeatureExtraction"
        # optional: explicit haar classifier path (if you want)
        # haar_path: "/home/ritik/Desktop/BE-Major-Project/LDA/OpenFace/build/bin/classifiers/haarcascade_frontalface_alt.xml"
    persist_clips: true

  audio:
    enabled: true
    device: "default"           # device name or index
    sr: 16000
    output_dir: "./processed/audio"
    receipt_dir: "./receipts"
    params:
      vad: "webrtc"             # or "none"
      denoise: true
      features:
        prosody: true
        egemaps: true
        wav2vec2:
          enabled: true
          model: "facebook/wav2vec2-base-960h"
          pool: "mean"
          chunk_seconds: 20.0
    persist_clips: true

  text:
    enabled: true
    source: "asr"               # "asr" or "file" or "live"
    asr_model: "openai/whisper-small" # concrete model id (adjust for your backend)
    offline: true
    output_dir: "./processed/text"
    receipt_dir: "./receipts"
    params:
      ner_scrub: ["PERSON","GPE","ORG"]
      embedder: "sentence-transformers/all-MiniLM-L6-v2"
      metrics: ["sentiment","ttr","pronoun_ratio"]

  sensors:
    enabled: false

privacy_policy:
  export_raw_media: false
  pii_scrub_text: true
  persist_windows_seconds: 5
  retention:
    raw_buffer_minutes: 2
    feature_store_days: 90
  purge_on_startup: false

video_pipe:
  head_pose_normalize: true
  openface:
    enabled: true
    features: ["AUs","gaze","pose","blink"]
    binary_path: "/home/ritik/Desktop/BE-Major-Project/LDA/OpenFace/build/bin/FeatureExtraction"
    # optional: classifier path - will be autodetected if omitted
    # haar_path: "/home/ritik/Desktop/BE-Major-Project/LDA/OpenFace/build/bin/classifiers/haarcascade_frontalface_alt.xml"

audio_pipe:
  vad: "webrtc"
  denoise: true
  features:
    prosody: true
    egemaps: true
    wav2vec2:
      model: "facebook/wav2vec2-base"
      pool: "mean"

text_pipe:
  ner_scrub: ["PERSON","GPE","ORG"]
  embedder: "sentence-transformers/all-MiniLM-L6-v2"
  metrics: ["sentiment","ttr","pronoun_ratio"]

storage:
  root: "./secure_store"     # changed from /var to local default for easy dev; update to /var/secure_store in prod
  encrypt: true
  key_provider: "file"          # options: file | os-keyring | kms
  key_path: "./secure_store/master.key"  # if key_provider == file

outputs:
  parquet_partitioning: ["modality","date","hour"]
  emit_manifest: true
  emit_receipts: true

limits:
  max_concurrent_sessions: 4
  max_raw_buffer_mb: 200
  max_upload_mb: 200
  log_level: "info"
  debug: false
